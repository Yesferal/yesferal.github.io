<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Yesferal Apps | Mobile Apps Developer</title>
    <meta name="description" content="Explore mobile apps developed by Yesferal. Available on Google Play and App Store.">

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Yesferal Apps">
    <meta property="og:description" content="Discover my mobile apps on Android and iOS">
    <meta property="og:type" content="website">

    <style>
        body {
          margin: 0;
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          background: #0f172a;
          color: #e2e8f0;
        }

        header {
          text-align: center;
          padding: 60px 20px;
        }

        header h1 {
          font-size: 2.5rem;
          margin-bottom: 10px;
        }

        header p {
          color: #94a3b8;
          font-size: 1.1rem;
        }

        .container {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
          gap: 24px;
          padding: 20px 40px 60px;
        }

        .app {
          background: #1e293b;
          border-radius: 20px;
          padding: 20px;
          text-align: center;
          transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .app:hover {
          transform: translateY(-6px);
          box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .app img {
          width: 90px;
          border-radius: 20px;
          margin-bottom: 10px;
        }

        .app h3 {
          margin: 10px 0;
        }

        .btn {
          display: block;
          margin: 8px 0;
          padding: 10px;
          border-radius: 10px;
          text-decoration: none;
          font-weight: 500;
        }

        .play {
          background: #22c55e;
          color: black;
        }

        .appstore {
          background: #e2e8f0;
          color: black;
        }

        footer {
          text-align: center;
          padding: 20px;
          color: #64748b;
          font-size: 0.9rem;
        }

        footer a {
          color: #94a3b8;
          text-decoration: none;
        }

    </style>
</head>
<body>

<header>
    <h1>Yesferal Apps</h1>
    <p>Building mobile experiences for Android & iOS</p>
</header>

<div class="container">

    <!-- APP 1 -->
    <div class="app">
        <img src="images/tumatch.png" alt="TuMatch">
        <h3>TuMatch</h3>

        <a class="btn play"
           href="https://play.google.com/store/apps/details?id=com.yesferal.tumatch">
            Google Play
        </a>
    </div>

    <!-- APP 2 -->
    <div class="app">
        <img src="images/chalkbet.png" alt="">
        <h3>ChalkBet</h3>

        <a class="btn play" href="https://play.google.com/store/apps/details?id=com.yesferal.bet">Google Play</a>
        <a class="btn appstore" href="https://apps.apple.com/ie/app/chalkbet/id6462945031">App Store</a>
    </div>


    <div class="app">
        <img src="images/hornsapp.png" alt="">
        <h3>HornsApp</h3>

        <a class="btn play" href="https://play.google.com/store/apps/details?id=com.yesferal.hornsapp">Google Play</a>
        <!-- No App Store button -->
    </div>

    <!-- APP 4 -->
    <div class="app">
        <img src="images/muvin.png" alt="">
        <h3>Muvin</h3>

        <a class="btn play" href="https://play.google.com/store/apps/details?id=com.yesferal.muvin">Google Play</a>

    </div>

</div>

<footer>
    © 2026 Yesferal · All rights reserved.
</footer>

</body>
</html>
