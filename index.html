<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- SEO -->
    <title>Yesferal Apps | Mobile Developer</title>
    <meta name="description" content="Discover high-quality mobile apps by Yesferal. Available on Android and iOS."/>

    <!-- Open Graph -->
    <meta property="og:title" content="Yesferal Apps"/>
    <meta property="og:description" content="Explore my apps on Google Play and App Store"/>
    <meta property="og:type" content="website"/>

    <style>
        body {
          margin: 0;
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          background: linear-gradient(180deg, #020617, #0f172a);
          color: white;
        }

        header {
          text-align: center;
          padding: 80px 20px 40px;
          animation: fadeIn 1s ease;
        }

        header h1 {
          font-size: 3rem;
          margin-bottom: 10px;
        }

        header p {
          color: #94a3b8;
          font-size: 1.2rem;
        }

        .container {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
          gap: 30px;
          padding: 40px;
        }

        .app {
          background: rgba(255,255,255,0.05);
          border-radius: 24px;
          padding: 20px;
          text-align: center;
          backdrop-filter: blur(10px);
          transition: all 0.3s ease;
          opacity: 0;
          transform: translateY(30px);
        }

        .app.visible {
          opacity: 1;
          transform: translateY(0);
        }

        .app:hover {
          transform: translateY(-8px) scale(1.02);
        }

        .app img {
          width: 90px;
          border-radius: 22px;
        }

        .app h3 {
          margin: 12px 0;
        }

        .btn {
          display: block;
          margin: 10px 0;
          padding: 12px;
          border-radius: 12px;
          text-decoration: none;
          font-weight: 600;
          transition: 0.2s;
        }

        .play {
          background: #22c55e;
          color: black;
        }

        .play:hover {
          background: #16a34a;
        }

        .appstore {
          background: white;
          color: black;
        }

        .appstore:hover {
          background: #e2e8f0;
        }

        footer {
          text-align: center;
          padding: 30px;
          color: #64748b;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(-20px); }
          to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<header>
    <h1>Yesferal Apps</h1>
    <p>Beautiful & functional mobile apps for Android and iOS</p>
</header>

<div class="container">

    <!-- APP 1 -->
    <div class="app">
        <img src="images/tumatch.png" alt="TuMatch">
        <h3>TuMatch</h3>

        <a class="btn play"
           href="https://play.google.com/store/apps/details?id=com.yesferal.tumatch">
            Google Play
        </a>
    </div>

    <!-- APP 2 -->
    <div class="app">
        <img src="images/chalkbet.png" alt="">
        <h3>ChalkBet</h3>

        <a class="btn play" href="https://play.google.com/store/apps/details?id=com.yesferal.bet">Google Play</a>
        <a class="btn appstore" href="https://apps.apple.com/ie/app/chalkbet/id6462945031">App Store</a>
    </div>


    <div class="app">
        <img src="images/hornsapp.png" alt="">
        <h3>HornsApp</h3>

        <a class="btn play" href="https://play.google.com/store/apps/details?id=com.yesferal.hornsapp">Google Play</a>
        <!-- No App Store button -->
    </div>

    <!-- APP 4 -->
    <div class="app">
        <img src="images/muvin.png" alt="">
        <h3>Muvin</h3>

        <a class="btn play" href="https://play.google.com/store/apps/details?id=com.yesferal.muvin">Google Play</a>

    </div>

</div>

<footer>
    © 2026 Yesferal · Built with ⚡ · All rights reserved.
</footer>

<script>
    // Scroll animation
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    });

    document.querySelectorAll('.app').forEach(el => observer.observe(el));
</script>

</body>
</html>
